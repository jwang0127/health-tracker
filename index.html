<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人健康数据追踪系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .main-content {
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
        }
        
        .left-panel {
            flex: 1;
            min-width: 300px;
            padding: 20px;
        }
        
        .right-panel {
            flex: 2;
            min-width: 500px;
            padding: 20px;
        }
        
        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }
        
        h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        h3 {
            color: #495057;
            margin-bottom: 15px;
        }
        
        .input-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #495057;
            font-weight: 500;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            min-height: 60px;
            resize: vertical;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e9ecef;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .date-cell {
            white-space: nowrap;
        }
        
        .note-cell {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 6px;
            margin: 10px 0;
            display: none;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .target-settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .target-item {
            padding: 10px;
            background: white;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 5px;
        }
        
        .status-normal { background: #28a745; }
        .status-warning { background: #ffc107; }
        .status-danger { background: #dc3545; }
        
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .left-panel, .right-panel {
                min-width: 100%;
            }
            
            .input-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 个人健康数据追踪系统</h1>
            <p class="subtitle">记录血糖、血压、心率，生成趋势图表，数据本地安全存储</p>
        </header>
        
        <div class="main-content">
            <!-- 左侧面板：数据录入 -->
            <div class="left-panel">
                <div class="card">
                    <h2>📝 今日数据录入</h2>
                    
                    <div class="form-group">
                        <label for="date">测量日期</label>
                        <input type="date" id="date" value="">
                    </div>
                    
                    <div class="input-group">
                        <div class="form-group">
                            <label for="fastingGlucose">空腹血糖 (mmol/L)</label>
                            <input type="number" id="fastingGlucose" step="0.1" min="2" max="30" placeholder="如：5.6">
                        </div>
                        
                        <div class="form-group">
                            <label for="glucose2h">餐后2h血糖 (mmol/L)</label>
                            <input type="number" id="glucose2h" step="0.1" min="2" max="30" placeholder="如：7.8">
                        </div>
                        
                        <div class="form-group">
                            <label for="glucose3h">餐后3h血糖 (mmol/L)</label>
                            <input type="number" id="glucose3h" step="0.1" min="2" max="30" placeholder="如：6.5">
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <div class="form-group">
                            <label for="systolic">收缩压 (高压 mmHg)</label>
                            <input type="number" id="systolic" min="50" max="250" placeholder="如：120">
                        </div>
                        
                        <div class="form-group">
                            <label for="diastolic">舒张压 (低压 mmHg)</label>
                            <input type="number" id="diastolic" min="30" max="150" placeholder="如：80">
                        </div>
                        
                        <div class="form-group">
                            <label for="heartRate">心率 (次/分钟)</label>
                            <input type="number" id="heartRate" min="40" max="200" placeholder="如：72">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="note">备注 / 身体状态</label>
                        <textarea id="note" placeholder="如：昨晚睡眠良好，早晨服药后测量"></textarea>
                    </div>
                    
                    <div class="btn-group">
                        <button class="btn-primary" onclick="saveRecord()">
                            <span>💾 保存记录</span>
                        </button>
                        <button class="btn-secondary" onclick="loadData()">
                            <span>🔄 刷新数据</span>
                        </button>
                        <button class="btn-danger" onclick="clearToday()">
                            <span>🗑️ 清除今日</span>
                        </button>
                    </div>
                </div>
                
                <!-- 目标值设置 -->
                <div class="card">
                    <h2>🎯 目标范围设置</h2>
                    <div class="target-settings">
                        <div class="target-item">
                            <label>空腹血糖</label>
                            <input type="number" id="targetFastingMin" value="3.9" step="0.1"> - 
                            <input type="number" id="targetFastingMax" value="6.1" step="0.1">
                        </div>
                        <div class="target-item">
                            <label>餐后血糖</label>
                            <input type="number" id="targetPostMin" value="4.4" step="0.1"> - 
                            <input type="number" id="targetPostMax" value="7.8" step="0.1">
                        </div>
                        <div class="target-item">
                            <label>血压</label>
                            <input type="number" id="targetBPMin" value="90" step="1">/ 
                            <input type="number" id="targetBPMax" value="120" step="1">
                        </div>
                        <div class="target-item">
                            <label>心率</label>
                            <input type="number" id="targetHRMin" value="60" step="1"> - 
                            <input type="number" id="targetHRMax" value="100" step="1">
                        </div>
                    </div>
                    <button class="btn-secondary" onclick="saveTargets()" style="margin-top: 15px; width: 100%;">
                        <span>💾 保存目标</span>
                    </button>
                </div>
                
                <!-- 数据管理 -->
                <div class="card">
                    <h2>🛠️ 数据管理</h2>
                    <div class="btn-group">
                        <button class="btn-success" onclick="exportToExcel()">
                            <span>📤 导出Excel</span>
                        </button>
                        <button class="btn-secondary" onclick="importData()">
                            <span>📥 导入数据</span>
                        </button>
                        <button class="btn-danger" onclick="clearAllData()">
                            <span>⚠️ 清空所有</span>
                        </button>
                    </div>
                    <div class="alert" id="alert"></div>
                </div>
            </div>
            
            <!-- 右侧面板：数据显示 -->
            <div class="right-panel">
                <!-- 统计概览 -->
                <div class="card">
                    <h2>📈 健康概览</h2>
                    <div class="stats-grid" id="stats">
                        <!-- 统计数据会动态生成在这里 -->
                    </div>
                </div>
                
                <!-- 图表展示 -->
                <div class="card">
                    <h2>📊 血糖趋势图</h2>
                    <div class="chart-container">
                        <canvas id="glucoseChart"></canvas>
                    </div>
                </div>
                
                <div class="card">
                    <h2>📈 血压趋势图</h2>
                    <div class="chart-container">
                        <canvas id="bpChart"></canvas>
                    </div>
                </div>
                
                <!-- 历史记录 -->
                <div class="card">
                    <h2>📋 历史记录</h2>
                    <div style="overflow-x: auto;">
                        <table id="historyTable">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>空腹</th>
                                    <th>餐后2h</th>
                                    <th>餐后3h</th>
                                    <th>血压</th>
                                    <th>心率</th>
                                    <th>备注</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="historyBody">
                                <!-- 数据会动态填充到这里 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 图表实例
        let glucoseChart = null;
        let bpChart = null;
        
        // 默认目标范围
        const defaultTargets = {
            fasting: { min: 3.9, max: 6.1 },
            postMeal: { min: 4.4, max: 7.8 },
            bloodPressure: { min: 90, max: 120 },
            heartRate: { min: 60, max: 100 }
        };
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置默认日期为今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            
            // 加载目标设置
            loadTargets();
            
            // 加载数据
            loadData();
        });
        
        // 加载目标范围
        function loadTargets() {
            const targets = JSON.parse(localStorage.getItem('healthTargets')) || defaultTargets;
            
            document.getElementById('targetFastingMin').value = targets.fasting.min;
            document.getElementById('targetFastingMax').value = targets.fasting.max;
            document.getElementById('targetPostMin').value = targets.postMeal.min;
            document.getElementById('targetPostMax').value = targets.postMeal.max;
            document.getElementById('targetBPMin').value = targets.bloodPressure.min;
            document.getElementById('targetBPMax').value = targets.bloodPressure.max;
            document.getElementById('targetHRMin').value = targets.heartRate.min;
            document.getElementById('targetHRMax').value = targets.heartRate.max;
        }
        
        // 保存目标范围
        function saveTargets() {
            const targets = {
                fasting: {
                    min: parseFloat(document.getElementById('targetFastingMin').value),
                    max: parseFloat(document.getElementById('targetFastingMax').value)
                },
                postMeal: {
                    min: parseFloat(document.getElementById('targetPostMin').value),
                    max: parseFloat(document.getElementById('targetPostMax').value)
                },
                bloodPressure: {
                    min: parseInt(document.getElementById('targetBPMin').value),
                    max: parseInt(document.getElementById('targetBPMax').value)
                },
                heartRate: {
                    min: parseInt(document.getElementById('targetHRMin').value),
                    max: parseInt(document.getElementById('targetHRMax').value)
                }
            };
            
            localStorage.setItem('healthTargets', JSON.stringify(targets));
            showAlert('目标范围已保存！', 'success');
            loadData(); // 刷新图表
        }
        
        // 保存记录
        function saveRecord() {
            const record = {
                date: document.getElementById('date').value,
                fastingGlucose: parseFloat(document.getElementById('fastingGlucose').value) || null,
                glucose2h: parseFloat(document.getElementById('glucose2h').value) || null,
                glucose3h: parseFloat(document.getElementById('glucose3h').value) || null,
                systolic: parseInt(document.getElementById('systolic').value) || null,
                diastolic: parseInt(document.getElementById('diastolic').value) || null,
                heartRate: parseInt(document.getElementById('heartRate').value) || null,
                note: document.getElementById('note').value.trim()
            };
            
            // 验证必填项
            if (!record.date) {
                showAlert('请选择日期！', 'warning');
                return;
            }
            
            if (!record.fastingGlucose && !record.glucose2h && !record.systolic) {
                showAlert('请至少填写一项数据！', 'warning');
                return;
            }
            
            // 获取现有数据
            let allData = JSON.parse(localStorage.getItem('healthRecords')) || [];
            
            // 检查是否已存在该日期的记录
            const existingIndex = allData.findIndex(item => item.date === record.date);
            if (existingIndex >= 0) {
                // 更新现有记录
                allData[existingIndex] = { ...allData[existingIndex], ...record };
            } else {
                // 添加新记录
                allData.push(record);
            }
            
            // 按日期排序
            allData.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            // 保存到本地存储
            localStorage.setItem('healthRecords', JSON.stringify(allData));
            
            showAlert('数据保存成功！', 'success');
            clearForm();
            loadData();
        }
        
        // 清除表单
        function clearForm() {
            document.getElementById('fastingGlucose').value = '';
            document.getElementById('glucose2h').value = '';
            document.getElementById('glucose3h').value = '';
            document.getElementById('systolic').value = '';
            document.getElementById('diastolic').value = '';
            document.getElementById('heartRate').value = '';
            document.getElementById('note').value = '';
        }
        
        // 清除今日数据
        function clearToday() {
            const today = new Date().toISOString().split('T')[0];
            let allData = JSON.parse(localStorage.getItem('healthRecords')) || [];
            
            allData = allData.filter(item => item.date !== today);
            localStorage.setItem('healthRecords', JSON.stringify(allData));
            
            showAlert('今日数据已清除！', 'success');
            loadData();
        }
        
        // 加载并显示数据
        function loadData() {
            const allData = JSON.parse(localStorage.getItem('healthRecords')) || [];
            const targets = JSON.parse(localStorage.getItem('healthTargets')) || defaultTargets;
            
            // 更新统计信息
            updateStats(allData, targets);
            
            // 更新历史表格
            updateHistoryTable(allData, targets);
            
            // 更新图表
            updateCharts(allData, targets);
        }
        
        // 更新统计信息
        function updateStats(data, targets) {
            if (data.length === 0) {
                document.getElementById('stats').innerHTML = '<p style="text-align: center; color: #6c757d;">暂无数据</p>';
                return;
            }
            
            // 计算空腹血糖统计
            const fastingValues = data.map(d => d.fastingGlucose).filter(v => v !== null);
            const fastingAvg = fastingValues.length ? (fastingValues.reduce((a, b) => a + b) / fastingValues.length).toFixed(1) : '-';
            
            // 计算血压统计
            const systolicValues = data.map(d => d.systolic).filter(v => v !== null);
            const systolicAvg = systolicValues.length ? Math.round(systolicValues.reduce((a, b) => a + b) / systolicValues.length) : '-';
            
            const diastolicValues = data.map(d => d.diastolic).filter(v => v !== null);
            const diastolicAvg = diastolicValues.length ? Math.round(diastolicValues.reduce((a, b) => a + b) / diastolicValues.length) : '-';
            
            // 计算心率统计
            const hrValues = data.map(d => d.heartRate).filter(v => v !== null);
            const hrAvg = hrValues.length ? Math.round(hrValues.reduce((a, b) => a + b) / hrValues.length) : '-';
            
            // 统计在目标范围内的比例
            let fastingInRange = 0;
            let bpInRange = 0;
            
            fastingValues.forEach(value => {
                if (value >= targets.fasting.min && value <= targets.fasting.max) fastingInRange++;
            });
            
            for (let i = 0; i < systolicValues.length; i++) {
                if (systolicValues[i] && diastolicValues[i]) {
                    if (systolicValues[i] <= targets.bloodPressure.max && 
                        diastolicValues[i] <= targets.bloodPressure.min) {
                        bpInRange++;
                    }
                }
            }
            
            const fastingRangePercent = fastingValues.length ? Math.round((fastingInRange / fastingValues.length) * 100) : 0;
            const bpRangePercent = systolicValues.length ? Math.round((bpInRange / systolicValues.length) * 100) : 0;
            
            const statsHTML = `
                <div class="stat-item">
                    <div class="stat-value">${data.length}</div>
                    <div class="stat-label">总记录数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${fastingAvg}</div>
                    <div class="stat-label">平均空腹血糖</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${systolicAvg}/${diastolicAvg}</div>
                    <div class="stat-label">平均血压</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${hrAvg}</div>
                    <div class="stat-label">平均心率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${fastingRangePercent}%</div>
                    <div class="stat-label">血糖达标率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${bpRangePercent}%</div>
                    <div class="stat-label">血压达标率</div>
                </div>
            `;
            
            document.getElementById('stats').innerHTML = statsHTML;
        }
        
        // 更新历史表格
        function updateHistoryTable(data, targets) {
            const tbody = document.getElementById('historyBody');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px; color: #6c757d;">暂无记录，请添加第一条数据</td></tr>';
                return;
            }
            
            let html = '';
            data.forEach((record, index) => {
                // 判断血糖状态
                let glucoseStatus = 'normal';
                if (record.fastingGlucose) {
                    if (record.fastingGlucose < targets.fasting.min || record.fastingGlucose > targets.fasting.max) {
                        glucoseStatus = 'warning';
                    }
                    if (record.fastingGlucose > targets.fasting.max + 2) {
                        glucoseStatus = 'danger';
                    }
                }
                
                // 判断血压状态
                let bpStatus = 'normal';
                if (record.systolic && record.diastolic) {
                    if (record.systolic > targets.bloodPressure.max || record.diastolic > targets.bloodPressure.min) {
                        bpStatus = 'warning';
                    }
                    if (record.systolic > targets.bloodPressure.max + 20) {
                        bpStatus = 'danger';
                    }
                }
                
                html += `
                    <tr>
                        <td class="date-cell">${formatDate(record.date)}</td>
                        <td>${record.fastingGlucose || '-'}<span class="status-indicator status-${glucoseStatus}"></span></td>
                        <td>${record.glucose2h || '-'}</td>
                        <td>${record.glucose3h || '-'}</td>
                        <td>${record.systolic || '-'}/${record.diastolic || '-'}<span class="status-indicator status-${bpStatus}"></span></td>
                        <td>${record.heartRate || '-'}</td>
                        <td class="note-cell" title="${record.note || ''}">${record.note || '-'}</td>
                        <td>
                            <button class="btn-secondary" style="padding: 5px 10px; font-size: 12px;" onclick="editRecord('${record.date}')">✏️</button>
                            <button class="btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteRecord('${record.date}')">🗑️</button>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        // 更新图表
        function updateCharts(data, targets) {
            if (data.length === 0) {
                // 清空图表
                if (glucoseChart) glucoseChart.destroy();
                if (bpChart) bpChart.destroy();
                return;
            }
            
            // 按日期排序
            const sortedData = [...data].sort((a, b) => new Date(a.date) - new Date(b.date));
            const dates = sortedData.map(d => formatDate(d.date, true));
            
            // 血糖图表
            const glucoseCtx = document.getElementById('glucoseChart').getContext('2d');
            if (glucoseChart) glucoseChart.destroy();
            
            glucoseChart = new Chart(glucoseCtx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: '空腹血糖',
                            data: sortedData.map(d => d.fastingGlucose),
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '餐后2h血糖',
                            data: sortedData.map(d => d.glucose2h),
                            borderColor: '#764ba2',
                            backgroundColor: 'rgba(118, 75, 162, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '餐后3h血糖',
                            data: sortedData.map(d => d.glucose3h),
                            borderColor: '#f093fb',
                            backgroundColor: 'rgba(240, 147, 251, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        annotation: {
                            annotations: {
                                targetRange: {
                                    type: 'box',
                                    yMin: targets.fasting.min,
                                    yMax: targets.fasting.max,
                                    backgroundColor: 'rgba(76, 175, 80, 0.1)',
                                    borderColor: 'rgba(76, 175, 80, 0.5)',
                                    borderWidth: 1
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: {
                                display: true,
                                text: '血糖值 (mmol/L)'
                            }
                        }
                    }
                }
            });
            
            // 血压图表
            const bpCtx = document.getElementById('bpChart').getContext('2d');
            if (bpChart) bpChart.destroy();
            
            bpChart = new Chart(bpCtx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: '收缩压 (高压)',
                            data: sortedData.map(d => d.systolic),
                            borderColor: '#ff6b6b',
                            backgroundColor: 'rgba(255, 107, 107, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: '舒张压 (低压)',
                            data: sortedData.map(d => d.diastolic),
                            borderColor: '#4ecdc4',
                            backgroundColor: 'rgba(78, 205, 196, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: {
                                display: true,
                                text: '血压值 (mmHg)'
                            }
                        }
                    }
                }
            });
        }
        
        // 编辑记录
        function editRecord(date) {
            const allData = JSON.parse(localStorage.getItem('healthRecords')) || [];
            const record = allData.find(item => item.date === date);
            
            if (record) {
                document.getElementById('date').value = record.date;
                document.getElementById('fastingGlucose').value = record.fastingGlucose || '';
                document.getElementById('glucose2h').value = record.glucose2h || '';
                document.getElementById('glucose3h').value = record.glucose3h || '';
                document.getElementById('systolic').value = record.systolic || '';
                document.getElementById('diastolic').value = record.diastolic || '';
                document.getElementById('heartRate').value = record.heartRate || '';
                document.getElementById('note').value = record.note || '';
                
                showAlert('已加载该日期的数据，修改后点击保存即可更新', 'success');
            }
        }
        
        // 删除记录
        function deleteRecord(date) {
            if (confirm(`确定要删除 ${formatDate(date)} 的记录吗？`)) {
                let allData = JSON.parse(localStorage.getItem('healthRecords')) || [];
                allData = allData.filter(item => item.date !== date);
                localStorage.setItem('healthRecords', JSON.stringify(allData));
                
                showAlert('记录已删除！', 'success');
                loadData();
            }
        }
        
        // 导出为Excel
        function exportToExcel() {
            const allData = JSON.parse(localStorage.getItem('healthRecords')) || [];
            
            if (allData.length === 0) {
                showAlert('没有数据可以导出！', 'warning');
                return;
            }
            
            // 准备数据
            const exportData = allData.map(record => ({
                '日期': record.date,
                '空腹血糖(mmol/L)': record.fastingGlucose || '',
                '餐后2h血糖(mmol/L)': record.glucose2h || '',
                '餐后3h血糖(mmol/L)': record.glucose3h || '',
                '收缩压(mmHg)': record.systolic || '',
                '舒张压(mmHg)': record.diastolic || '',
                '心率(次/分)': record.heartRate || '',
                '备注': record.note || ''
            }));
            
            // 创建工作表
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '健康数据');
            
            // 添加统计信息
            const stats = calculateStats(allData);
            const statsData = [
                ['统计项目', '数值'],
                ['总记录数', stats.total],
                ['空腹血糖平均值', stats.avgFasting],
                ['收缩压平均值', stats.avgSystolic],
                ['舒张压平均值', stats.avgDiastolic],
                ['心率平均值', stats.avgHeartRate],
                ['导出日期', new Date().toLocaleDateString()]
            ];
            
            const ws2 = XLSX.utils.aoa_to_sheet(statsData);
            XLSX.utils.book_append_sheet(wb, ws2, '统计信息');
            
            // 导出文件
            const fileName = `健康数据_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, fileName);
            showAlert(`数据已导出为 ${fileName}`, 'success');
        }
        
        // 导入数据
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json,.xlsx,.xls,.csv';
            
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const content = e.target.result;
                        let importedData;
                        
                        if (file.name.endsWith('.json')) {
                            importedData = JSON.parse(content);
                        } else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                            const workbook = XLSX.read(content, { type: 'binary' });
                            const sheet = workbook.Sheets[workbook.SheetNames[0]];
                            importedData = XLSX.utils.sheet_to_json(sheet);
                            
                            // 转换列名
                            importedData = importedData.map(row => ({
                                date: row['日期'],
                                fastingGlucose: row['空腹血糖(mmol/L)'],
                                glucose2h: row['餐后2h血糖(mmol/L)'],
                                glucose3h: row['餐后3h血糖(mmol/L)'],
                                systolic: row['收缩压(mmHg)'],
                                diastolic: row['舒张压(mmHg)'],
                                heartRate: row['心率(次/分)'],
                                note: row['备注']
                            }));
                        } else {
                            showAlert('不支持的文件格式！', 'warning');
                            return;
                        }
                        
                        if (confirm(`找到 ${importedData.length} 条记录，是否导入？`)) {
                            localStorage.setItem('healthRecords', JSON.stringify(importedData));
                            showAlert('数据导入成功！', 'success');
                            loadData();
                        }
                    } catch (error) {
                        showAlert('导入失败，请检查文件格式！', 'warning');
                        console.error(error);
                    }
                };
                
                if (file.name.endsWith('.json')) {
                    reader.readAsText(file);
                } else {
                    reader.readAsBinaryString(file);
                }
            };
            
            input.click();
        }
        
        // 清空所有数据
        function clearAllData() {
            if (confirm('⚠️ 警告：确定要清空所有数据吗？此操作不可恢复！')) {
                localStorage.removeItem('healthRecords');
                showAlert('所有数据已清空！', 'success');
                loadData();
            }
        }
        
        // 计算统计信息
        function calculateStats(data) {
            const fastingValues = data.map(d => d.fastingGlucose).filter(v => v !== null);
            const systolicValues = data.map(d => d.systolic).filter(v => v !== null);
            const diastolicValues = data.map(d => d.diastolic).filter(v => v !== null);
            const hrValues = data.map(d => d.heartRate).filter(v => v !== null);
            
            return {
                total: data.length,
                avgFasting: fastingValues.length ? (fastingValues.reduce((a, b) => a + b) / fastingValues.length).toFixed(1) : '-',
                avgSystolic: systolicValues.length ? Math.round(systolicValues.reduce((a, b) => a + b) / systolicValues.length) : '-',
                avgDiastolic: diastolicValues.length ? Math.round(diastolicValues.reduce((a, b) => a + b) / diastolicValues.length) : '-',
                avgHeartRate: hrValues.length ? Math.round(hrValues.reduce((a, b) => a + b) / hrValues.length) : '-'
            };
        }
        
        // 显示提示
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }
        
        // 格式化日期
        function formatDate(dateStr, short = false) {
            const date = new Date(dateStr);
            if (short) {
                return `${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getDate().toString().padStart(2, '0')}`;
            }
            return date.toLocaleDateString('zh-CN');
        }
    </script>
