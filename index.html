<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康数据追踪</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        /* ... 保持原有所有样式不变 ... */
        
        .tab-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f2f5;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: #f8f9fa;
            border: none;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 14px;
        }
        
        .tab-btn.active {
            background: #4b6cb7;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* ... 保持其余样式不变 ... */
    </style>
</head>
<body>
    <!-- ... 保持HTML结构不变 ... -->
    
    <!-- 历史记录标签页 -->
    <div class="card">
        <h2>📋 历史记录</h2>
        
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('daily-tab')">每日数据</button>
            <button class="tab-btn" onclick="switchTab('lipid-tab')">血脂记录</button>
            <button class="tab-btn" onclick="switchTab('medication-tab')">药物历史</button>
        </div>
        
        <!-- 每日数据标签页 -->
        <div id="daily-tab" class="tab-content active">
            <div class="history-table-wrapper">
                <table id="dailyHistoryTable">
                    <!-- ... 表格内容 ... -->
                </table>
            </div>
        </div>
        
        <!-- 血脂记录标签页 -->
        <div id="lipid-tab" class="tab-content">
            <div class="history-table-wrapper">
                <table id="lipidHistoryTable">
                    <!-- ... 表格内容 ... -->
                </table>
            </div>
        </div>
        
        <!-- 药物历史标签页 -->
        <div id="medication-tab" class="tab-content">
            <div class="history-table-wrapper">
                <table id="medicationHistoryTable">
                    <!-- ... 表格内容 ... -->
                </table>
            </div>
        </div>
    </div>

    <script>
        // ... 其他JavaScript代码 ...
        
        // 切换标签页
        function switchTab(tabId) {
            // 移除所有active类
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // 激活选中的标签页
            const activeBtn = document.querySelector(`[onclick="switchTab('${tabId}')"]`);
            if (activeBtn) {
                activeBtn.classList.add('active');
            }
            const activeContent = document.getElementById(tabId);
            if (activeContent) {
                activeContent.classList.add('active');
            }
        }
        
        // ... 其他JavaScript函数 ...
    </script>
</body>
</html>
